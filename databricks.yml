# ============================================================
# databricks.yml
# This is the ROOT config file for the bundle. Every bundle needs
# exactly one file with this name at the project root.
# ============================================================

bundle:
  name: retail-sales-dab
  engine: direct   # the new default deployment engine (GA since CLI 1.3.0)

include:
  - resources/*.yml

# ------------------------------------------------------------
# Variables let you parameterize catalog/schema names so the same
# bundle can point at different places per target (dev/prod).
# ------------------------------------------------------------
variables:
  catalog:
    description: Unity Catalog catalog to use
    default: workspace   # Free Edition default catalog is usually "workspace"
  schema:
    description: Schema (database) to create tables in
    default: retail_sales_dab_dev

# ------------------------------------------------------------
# Targets = deployment environments. Free Edition only has ONE
# workspace, so we just define "dev". In a real multi-workspace
# setup you'd add a "prod" target here too.
# ------------------------------------------------------------

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://dbc-2cae7c0e-8ec9.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      schema: retail_sales_dab_dev

  prod:
    mode: production
    workspace:
      host: https://dbc-01984d2c-89d1.cloud.databricks.com/
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      schema: retail_sales_dab_prod